app:
  modo: WEB

tradutor:
  # Pastas padrao para modo WEB (a UI sobrescreve em cada operacao).
  diretorio-entrada: entrada
  diretorio-saida: saida
  diretorio-cache: cache
  # Quantidade de falas por requisicao ao LLM. Modificado para 1 (linha a linha) para evitar falhas e alucinações.
  tamanho-lote: 1
  # Estilos ASS que nao devem ser traduzidos (ex: letra original em romaji
  # usada para karaoke, que deve permanecer no idioma original).
  estilos-ignorados:
    - "Song JP"
    - "Mobile Suit Gundam"
    - "Char's Counterattack"
    - "OP - Romaji"
    - "OP - English"
    - "ED - Romaji"
    - "ED - English"
    - "ED-ROM"
  # Chaves de idioma gravadas no cache JSON (par original -> traduzido).
  idioma-original: "en"
  idioma-traduzido: "pt-br"
  # Fallback online de ULTIMO RECURSO (Google Translate) para as falas de dialogo
  # que o LLM local nao conseguiu traduzir. OPT-IN, desligado por padrao: quando
  # false o pipeline e 100% local. Quando true, apenas as pendencias desta execucao
  # vao ao provedor externo, ja validadas pela mesma checagem canonica do LLM.
  fallback-online:
    ativo: true
  llm:
    base-url: "http://127.0.0.1:1234/v1"
    # "current" e proposital: usar o id exato do modelo aqui faz o LM Studio
    # abrir uma segunda instancia via auto-load (JIT) toda vez que o valor nao
    # bate com a instancia ja carregada. O app adapta em runtime para o que
    # estiver carregado (ver LlmClientAdapter.verificarDisponibilidade).
    # Troque o modelo pela UI/lms do LM Studio, nao aqui.
    model: "current"
    temperature: 0.3
    max-tokens: 2000
    connect-timeout: 5s
    read-timeout: 180s

# Stack LLM propria da Revisao de Lore (Opcao 7), isolada do namespace
# tradutor.llm. Defaults equivalentes ao comportamento efetivo atual.
revisao-lore:
  llm:
    base-url: "http://127.0.0.1:1234/v1"
    model: "current"
    max-tokens: 2000
    connect-timeout: 5s
    read-timeout: 180s

remuxer:
  mkvmerge-path: mkvmerge

extrator:
  formato: ASS
  mkvmerge-path: mkvmerge
  mkvextract-path: mkvextract
  ffmpeg-path: ffmpeg
  ffprobe-path: ffprobe

tmdb:
  api-key: dummy_key

# Config HTTP propria da fatia apiDadosAnime (timeouts do cliente das APIs de
# metadados de anime: AniList/Jikan/TMDB). Isolada de tradutor.llm; valores
# efetivos preservados (E4a).
api-dados-anime:
  http:
    connect-timeout: 5s
    read-timeout: 180s

# Repositório dedicado do dataset público de telemetria (botão "Publicar
# Dataset" no painel de Telemetria). Nome na convenção da comunidade:
# [NomeDoSistema]-telemetry-dataset. O repositório remoto precisa existir no
# GitHub (criado uma única vez, vazio); o resto é bootstrap automático.
telemetria-dataset:
  repositorio-local: ../kronos-anime-translation-telemetry-dataset
  repositorio-remoto: https://github.com/carmipa/kronos-anime-translation-telemetry-dataset.git
  hardware:
    publicar-ambiente-execucao: true
    permitir-deteccao-automatica: true
