# Quarkus
app.modo=WEB
# Porta dedicada ao KRONOS (8099) para coexistir com outros apps Quarkus que
# usam a 8080 por padrao (ex.: ASPM Pride Security). O endpoint MCP /mcp fica
# nesta mesma porta; ver .mcp.json.
quarkus.http.port=8099
quarkus.http.host=127.0.0.1

quarkus.arc.ignored-split-packages=org.traducao.projeto

quarkus.log.file.path=logs/tradutor.log
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5

%dev.quarkus.config.locations=application-local.yml
# O KRONOS roda localmente e seus painéis evoluem junto com o backend. Impede que
# qualquer modo de execução (dev ou pacote local) sirva HTML/JS antigo do cache do
# navegador, o que poderia ocultar campos e canais SSE recém-adicionados.
quarkus.http.static-resources.caching-enabled=false

# Testes
%test.app.modo=WEB
%test.app.browser.auto-open=false
%test.quarkus.http.test-port=0
# Auditoria (Opção 3): nos testes, gravar o JSON só na pasta de entrada (@TempDir)
# e NÃO escrever em relatorios/ nem registrar telemetria canônica.
%test.kronos.auditoria.persistencia-canonica=false
