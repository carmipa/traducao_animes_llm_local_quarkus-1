# Quarkus
app.modo=WEB
# Porta dedicada ao KRONOS (8099) para coexistir com outros apps Quarkus que
# usam a 8080 por padrao (ex.: ASPM Pride Security). O endpoint MCP /mcp fica
# nesta mesma porta; ver .mcp.json.
quarkus.http.port=8099
quarkus.http.host=127.0.0.1

quarkus.arc.ignored-split-packages=org.traducao.projeto

quarkus.log.file.path=logs/tradutor.log
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5

# --- Logging DEBUG (dev): console + arquivo logs/tradutor.log para auditoria ---
# min-level ja e DEBUG por padrao; explicito para garantir que DEBUG/TRACE possam sair.
quarkus.log.min-level=DEBUG
quarkus.log.console.color=true
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%t] %-40.40c{3.} : %s%e%n
# Arquivo so em dev: 'enable' e o que faltava (path/rotation acima nao escrevem sozinhos).
%dev.quarkus.log.file.enable=true
%dev.quarkus.log.file.level=DEBUG
%dev.quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}] (%t) %s%e%n
%dev.quarkus.log.console.level=DEBUG
# Access log HTTP em dev (equivale ao org.springframework.web=DEBUG do Spring).
%dev.quarkus.http.access-log.enabled=true
%dev.quarkus.http.access-log.pattern=%r %s %b %D ms
# As categorias org.traducao.projeto e io.smallrye.config ficam no application-local.yml (dev).

%dev.quarkus.config.locations=application-local.yml
# O KRONOS roda localmente e seus painéis evoluem junto com o backend. Impede que
# qualquer modo de execução (dev ou pacote local) sirva HTML/JS antigo do cache do
# navegador, o que poderia ocultar campos e canais SSE recém-adicionados.
quarkus.http.static-resources.caching-enabled=false

# Testes
%test.app.modo=WEB
%test.app.browser.auto-open=false
%test.quarkus.http.test-port=0
# Heartbeat SSE curto na suíte: o SseConsoleDinamicoTest verifica o keepalive sem
# esperar os 15s de produção. Ver LogStreamService#iniciarHeartbeat.
%test.kronos.sse.heartbeat-intervalo-segundos=1
# Auditoria (Opção 3): nos testes, gravar o JSON só na pasta de entrada (@TempDir)
# e NÃO escrever em relatorios/ nem registrar telemetria canônica.
%test.kronos.auditoria.persistencia-canonica=false
